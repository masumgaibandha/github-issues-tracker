<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
      .text-color {
        color: #64748b;
      }
      .primary {
        background-color: #4a00ff;
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <div
          class="navbar bg-base-100 shadow-sm flex justify-between items-center"
        >
          <div class="flex justify-between items-center">
            <img src="assets/github-logo.png" alt="" class="w-10" />
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
          </div>
          <div class="flex gap-2">
            <input
              id="search-input"
              type="text"
              placeholder="Search"
              class="input input-bordered w-24 md:w-auto"/>

            <button id="issue-btn" class="bg-[#4A00FF] btn text-white">
              New Issue
            </button>
            
          </div>
        </div>
      </nav>

      <section class="w-11/12 mx-auto py-10">
        <div
          id="issue-btn"
          class="bg-base-100 border-2 border-gray-100 shadow-md px-5 py-10"
        >
          <h2 class="pb-5 font-bold text-2xl">All Issues</h2>
          <button id="all-btn" class="btn btn-outline text-[#64748B] px-14">
            All
          </button>
          <button id="open-btn" class="btn btn-outline text-[#64748B] px-14">
            Open
          </button>
          <button id="closed-btn" class="btn btn-outline text-[#64748B] px-14">
            Closed
          </button>
        </div>

        <div
          class="bg-base-100 border-2 border-gray-100 shadow-md px-5 py-10 mt-3 flex justify-between items-center"
        >
          <div class="flex gap-5 items-center">
            <div class="bg-[#ECE4FF] p-3 rounded-full">
              <img src="assets/Aperture.png" alt="" />
            </div>

            <div id="issue-number">
              <span id="issues-count" class="text-xl font-semibold">0</span> <span class="text-xl font-semibold">Issues</span>
              <p>Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex gap-5">
            <p><img src="assets/elipe2.png" alt="" class="inline" /> Open</p>
            <p><img src="assets/elipe.png" alt="" class="inline" /> Closed</p>
          </div>
        </div>

        <!-- Issue Container -->
        <div id="issues-card" class="pt-10 grid grid-cols-3 gap-3">
          <!-- Card -->

          <div class="card bg-base-100 shadow-2xl">
            <div class="card-body">
              <div class="flex justify-between items-center">
                <img src="assets/Open-Status.png" alt="" />
                <!-- <div class="badge badge-primary">NEW</div> -->
                <button
                  class="btn bg-[#FEECEC] text-[#EF4444] rounded-[100px] w-20 h-8 p-2 px-5"
                >
                  High
                </button>
              </div>
              <h2 class="card-title">Fix navigation menu on mobile devices</h2>
              <p class="text-color">
                A card component has a figure, a body part, and inside body
                there are title and actions parts
              </p>
              <div class="flex gap-6 items-center py-3">
                <button
                  class="btn bg-[#FEECEC] text-[#EF4444] rounded-[100px] w-20 h-8 p-2 px-5"
                >
                  <img src="assets/Vector.png" alt="" />Bug
                </button>
                <button
                  class="btn bg-[#d2f3c4] text-[#d94906] rounded-[100px] w-16 h-8 p-2 px-5"
                >
                  <img src="assets/Aperture.png" alt="" class="w-6 h-6" />
                  help wanted
                </button>
              </div>
            </div>
            <hr class="text-gray-400" />
            <div class="card-body text-color">
              <div>#1 by john_doe</div>
              <div>1/15/2024</div>
            </div>
          </div>
        </div>
        <!-- Loading spinner -->
        <div
          id="loading-spinner"
          class="h-[30vh] hidden flex justify-center items-center"
        >
          <span class="loading loading-dots loading-xl"></span>
        </div>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
          <div class="modal-box">
            <div id="modal-container">
            
            </div>
          </div>
        </dialog>
      </section>
    </header>
    

    <script src="home.js"></script>
  </body>
</html>
